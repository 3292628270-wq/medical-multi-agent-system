spring:
  application:
    name: clinical-decision-system
  datasource:
    url: jdbc:postgresql://localhost:5432/clinical_decision
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
